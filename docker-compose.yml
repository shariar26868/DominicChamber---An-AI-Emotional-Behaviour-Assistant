version: "3.9"

services:
  api:
    build: .
    container_name: person_advisor_api
    ports:
      - "8100:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - advisor_network

  mongodb:
    image: mongo:7.0
    container_name: person_advisor_mongodb
    ports:
      - "27035:27017"
    environment:
      MONGO_INITDB_DATABASE: person_advisor_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advisor_network

volumes:
  mongo_data:

networks:
  advisor_network:
    driver: bridge